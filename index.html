<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nike Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <div class="logo">NIKE</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Sale</a>
        </nav>

        <div class="nav-right">
            <button id="login-btn" class="login-btn">Login</button>
            <button class="cart">🛒 <span id="cartCount">0</span></button>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        JUST DO IT
    </section>

    <!-- FEATURED SLIDER -->
    <section class="featured">
        <h2>Featured Drops</h2>

        <div class="slider-container">
            <button class="slider-btn left" onclick="scrollSlider(-1)">❮</button>

        <div class="slider-viewport">
            <div class="slider" id="slider"></div>
        </div>

            <button class="slider-btn right" onclick="scrollSlider(1)">❯</button>
        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="products" id="productList"></section>

        <section id="adminPanel">
            <h2>Admin Panel</h2>

            <div class="admin-grid">
                <input type="text" id="pName" placeholder="Product Name">
                <input type="number" id="pPrice" placeholder="Price">
                <input type="text" id="pImg" placeholder="Image URL">

                <select id="pType">
                    <option value="normal">Normal</option>
                    <option value="featured">Featured</option>
                </select>
            </div>

            <button id="addProductBtn">Add Product</button>
        </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-container">
            <div>
                <h3>About</h3>
                <p>Demo Nike store built by Fish.</p>
            </div>

            <div>
                <h3>Help</h3>
                <p>Contact</p>
                <p>Shipping</p>
                <p>Returns</p>
            </div>

            <div>
                <h3>Social</h3>
                <p>Instagram</p>
                <p>Twitter</p>
                <p>Facebook</p>
            </div>
        </div>

        <p class="footer-bottom">© 2026 Nike Clone</p>
    </footer>

    <script type="module" src="script.js"></script>
    <div id="authModal" class="auth-modal">
        <div class="auth-box">
            <h2 id="authTitle">Login</h2>

            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">

            <button id="authBtn">Login</button>
            <p id="toggleAuth">Don't have an account? Sign up</p>
        </div>
    </div>



    <div id="cartPanel" class="cart-panel">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <button id="closeCart">✖</button>
    </div>

    <div id="cartItems" class="cart-items"></div>

    <div class="cart-footer">
        <p>Total: $<span id="cartTotal">0</span></p>
    </div>
    </div>

    <!-- ✅ CHECKOUT BUTTON -->
    <button id="checkoutBtn" class="checkout-btn">Checkout</button>
    <script>
      (function (w, d, s, o, f, js, fjs) {
        w["botsonic_widget"] = o;
        w[o] =
          w[o] ||
          function () {
            (w[o].q = w[o].q || []).push(arguments);
          };
        (js = d.createElement(s)), (fjs = d.getElementsByTagName(s)[0]);
        js.id = o;

        js.async = 1;
        fjs.parentNode.insertBefore(js, fjs);
      })(window, document, "script", "Botsonic", "https://widget.botsonic.com/CDN/botsonic.min.js");

        token: "f8b66dff-b6c9-4188-8545-78e9f651bcbf",
      });
    </script>
</body>
</html>
